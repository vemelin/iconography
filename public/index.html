<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload App - Vercel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            margin-bottom: 30px;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .files-list {
            margin-top: 30px;
        }

        .files-list h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .file-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-info {
            flex: 1;
            min-width: 200px;
        }

        .file-name {
            color: #333;
            font-weight: 500;
            word-break: break-all;
            margin-bottom: 5px;
        }

        .file-meta {
            color: #666;
            font-size: 12px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-small:hover {
            background: #5568d3;
        }

        .btn-delete {
            background: #dc3545;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .progress {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ File Upload App</h1>
        <p class="subtitle">Upload and manage your files on Vercel</p>

        <div class="upload-section">
            <div class="upload-icon">📤</div>
            <form id="uploadForm">
                <input type="file" id="fileInput" required>
                <br>
                <button type="submit" class="btn" id="uploadBtn">Upload File</button>
            </form>
            <div class="progress" id="progress">
                <div class="progress-bar" id="progressBar">Uploading...</div>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="files-list">
            <h2>📁 Your Files</h2>
            <div id="filesList">
                <div class="loading">Loading files...</div>
            </div>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const filesList = document.getElementById('filesList');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');

        // Load files on page load
        loadFiles();

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                uploadBtn.disabled = true;
                progress.style.display = 'block';
                progressBar.style.width = '50%';

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                progressBar.style.width = '100%';

                if (response.ok) {
                    showStatus('✅ File uploaded successfully!', 'success');
                    fileInput.value = '';
                    setTimeout(() => {
                        loadFiles();
                        progress.style.display = 'none';
                        progressBar.style.width = '0%';
                    }, 1000);
                } else {
                    showStatus('❌ Upload failed: ' + result.error, 'error');
                    progress.style.display = 'none';
                }
            } catch (error) {
                showStatus('❌ Upload failed: ' + error.message, 'error');
                progress.style.display = 'none';
            } finally {
                uploadBtn.disabled = false;
            }
        });

        async function loadFiles() {
            try {
                const response = await fetch('/api/files');
                const files = await response.json();

                if (files.length === 0) {
                    filesList.innerHTML = '<div class="empty-state">📭 No files uploaded yet</div>';
                    return;
                }

                filesList.innerHTML = files.map(file => `
                    <div class="file-item">
                        <div class="file-info">
                            <div class="file-name">📄 ${file.filename}</div>
                            <div class="file-meta">
                                ${formatFileSize(file.size)} • ${formatDate(file.uploadedAt)}
                            </div>
                        </div>
                        <div class="file-actions">
                            <a href="${file.url}" class="btn-small" download target="_blank">Download</a>
                            <button class="btn-small btn-delete" onclick="deleteFile('${file.url}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading files:', error);
                filesList.innerHTML = '<div class="empty-state">⚠️ Error loading files</div>';
            }
        }

        async function deleteFile(url) {
            if (!confirm('Are you sure you want to delete this file?')) {
                return;
            }

            try {
                const response = await fetch('/api/delete?url=' + encodeURIComponent(url), {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showStatus('✅ File deleted successfully!', 'success');
                    loadFiles();
                } else {
                    showStatus('❌ Delete failed', 'error');
                }
            } catch (error) {
                showStatus('❌ Delete failed: ' + error.message, 'error');
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status ' + type;

            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }
    </script>
</body>
</html>
